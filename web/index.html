<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="derivative_damath">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>derivative_damath</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Splash screen styles -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #041a63;
    }
    
    #flutter-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('splash-screen.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #041a63;
      z-index: 9999;
      transition: opacity 220ms ease;
    }

    #flutter-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .flutter-loading::after {
      display: none;
    }
  </style>
</head>
<body>
  <div id="flutter-loader"></div>
  <script>
    function hideFlutterLoader() {
      const loader = document.getElementById('flutter-loader');
      if (!loader) return;
      loader.classList.add('hidden');
      window.setTimeout(() => loader.remove(), 250);
    }

    window.addEventListener('flutter-first-frame', hideFlutterLoader);
    window.setTimeout(hideFlutterLoader, 12000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
